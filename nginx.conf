events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server {
        listen       8080;
        server_name  localhost;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # GHG Tool webapp
        location /ghg-tool/ {
            alias /usr/share/nginx/html/ghg-tool/;
            try_files $uri $uri/ /ghg-tool/index.html;
        }

        # Housing Tool webapp
        location /housing-tool/ {
            alias /usr/share/nginx/html/housing-tool/;
            try_files $uri $uri/ /housing-tool/index.html;
        }

        # Main site
        location / {
            try_files $uri $uri/ =404;
        }

        # Error pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
